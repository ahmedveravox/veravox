<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#1A3D2B"/>
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <!-- Subtle geometric border -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Open book icon -->
  <g transform="translate(256,210)">
    <!-- Left page -->
    <path d="M-10,-70 C-40,-65 -90,-50 -110,-30 L-110,80 C-90,65 -40,55 -10,58 Z"
          fill="rgba(255,255,255,0.9)" opacity="0.95"/>
    <!-- Right page -->
    <path d="M10,-70 C40,-65 90,-50 110,-30 L110,80 C90,65 40,55 10,58 Z"
          fill="rgba(255,255,255,0.75)" opacity="0.9"/>
    <!-- Spine -->
    <rect x="-6" y="-72" width="12" height="135" rx="4" fill="white"/>
    <!-- Lines on left page -->
    <line x1="-90" y1="-10" x2="-20" y2="-18" stroke="rgba(0,0,0,0.2)" stroke-width="4" stroke-linecap="round"/>
    <line x1="-90" y1="10" x2="-20" y2="4" stroke="rgba(0,0,0,0.15)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-90" y1="28" x2="-20" y2="24" stroke="rgba(0,0,0,0.15)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-85" y1="46" x2="-20" y2="44" stroke="rgba(0,0,0,0.1)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Lines on right page -->
    <line x1="90" y1="-10" x2="20" y2="-18" stroke="rgba(0,0,0,0.2)" stroke-width="4" stroke-linecap="round"/>
    <line x1="90" y1="10" x2="20" y2="4" stroke="rgba(0,0,0,0.15)" stroke-width="3" stroke-linecap="round"/>
    <line x1="90" y1="28" x2="20" y2="24" stroke="rgba(0,0,0,0.15)" stroke-width="3" stroke-linecap="round"/>
    <line x1="85" y1="46" x2="20" y2="44" stroke="rgba(0,0,0,0.1)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- App name below book -->
  <text x="256" y="390" text-anchor="middle"
        font-family="'Traditional Arabic','Arial Unicode MS',serif"
        font-size="72" font-weight="bold" fill="white" opacity="0.95">
    نور
  </text>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F5C3A"/>
      <stop offset="100%" stop-color="#0B2A1A"/>
    </linearGradient>
  </defs>
</svg>

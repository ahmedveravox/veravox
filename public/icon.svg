<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="120" fill="url(#wk-bg)"/>

  <!-- Hexagon grid pattern (AI / tech feel) -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- W letter stylized -->
  <path d="M 130 170 L 185 350 L 256 240 L 327 350 L 382 170"
        fill="none" stroke="white" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- Gold accent dot -->
  <circle cx="256" cy="240" r="16" fill="#f59e0b" opacity="0.9"/>

  <defs>
    <linearGradient id="wk-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
  </defs>
</svg>
